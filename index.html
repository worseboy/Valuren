<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valuren - Professional E-Commerce Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --red: #d42b2b; --black: #0a0a0a; --white: #fff; --gray: #f7f7f7; --border: #e8e8e8; --text: #1a1a1a; --muted: #888; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; color: var(--text); background: var(--white); }
    button, a { cursor: pointer; text-decoration: none; color: inherit; border: none; background: none; }
    
    nav { background: var(--white); border-bottom: 1px solid var(--border); padding: 0.8rem 1.1rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.75rem; font-weight: 700; font-style: italic; color: var(--black); }
    .nav-right { display: flex; gap: 0.85rem; }
    .nav-icon { cursor: pointer; font-size: 1.1rem; position: relative; }
    .nav-badge { position: absolute; top: -5px; right: -8px; background: var(--black); color: #fff; width: 18px; height: 18px; border-radius: 50%; font-size: 0.55rem; display: flex; align-items: center; justify-content: center; font-weight: 700; }
    
    .hero { background: linear-gradient(135deg, #1a1a1a 0%, #333 100%); color: #fff; padding: 4rem 1.5rem; text-align: center; min-height: 420px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .hero h1 { font-size: clamp(2.5rem, 10vw, 4rem); font-weight: 900; margin-bottom: 1rem; letter-spacing: -0.02em; }
    .hero p { font-size: 1.1rem; opacity: 0.9; margin-bottom: 2rem; }
    .hero-btn { background: var(--red); color: #fff; padding: 0.85rem 2.75rem; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; border-radius: 2px; transition: background 0.2s; }
    .hero-btn:hover { background: #b82020; }
    
    .section-title { font-size: 1.9rem; font-weight: 700; letter-spacing: 0.15em; text-align: center; padding: 2.75rem 1.1rem 1.5rem; text-transform: uppercase; }
    
    .cat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; padding: 1rem; }
    .cat-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; padding: 0.65rem; cursor: pointer; transition: all 0.3s; }
    .cat-card:hover { box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1); }
    .cat-img { aspect-ratio: 4/3; overflow: hidden; background: var(--gray); border-radius: 8px; }
    .cat-img img { width: 100%; height: 100%; object-fit: cover; }
    .cat-name { font-size: 0.95rem; font-weight: 800; text-align: center; margin: 0.75rem 0; text-transform: uppercase; }
    .cat-btn { display: block; width: 100%; border: 1.5px solid var(--black); padding: 0.65rem; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.14em; text-align: center; text-transform: uppercase; transition: all 0.2s; }
    .cat-btn:hover { background: var(--black); color: #fff; }
    
    .prod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 0.8rem; padding: 1rem; }
    .prod-card { cursor: pointer; }
    .prod-img { aspect-ratio: 3/4; overflow: hidden; background: var(--gray); border-radius: 6px; }
    .prod-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
    .prod-card:hover .prod-img img { transform: scale(1.05); }
    .prod-info { padding: 0.6rem 0; text-align: center; }
    .prod-name { font-size: 0.8rem; font-weight: 600; margin-bottom: 0.3rem; line-height: 1.3; }
    .prod-price { font-size: 0.85rem; font-weight: 700; color: var(--black); }
    .prod-btn { margin-top: 0.5rem; padding: 0.4rem 0.8rem; font-size: 0.65rem; }
    
    .btn { padding: 0.7rem 1.5rem; border-radius: 6px; font-weight: 700; font-size: 0.75rem; transition: all 0.2s; border: none; }
    .btn-black { background: var(--black); color: #fff; }
    .btn-black:hover { background: #222; }
    .btn-red { background: var(--red); color: #fff; }
    .btn-red:hover { background: #b82020; }
    
    footer { background: var(--black); color: #fff; padding: 2rem 1.5rem; text-align: center; }
    footer p { font-size: 0.85rem; opacity: 0.7; margin-bottom: 0.5rem; }
    
    .loading { text-align: center; padding: 2rem; color: var(--muted); }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">Valuren</div>
  <div class="nav-right">
    <div class="nav-icon" onclick="alert('Search feature coming soon!')">🔍</div>
    <div class="nav-icon" onclick="alert('Account feature coming soon!')">👤</div>
    <div class="nav-icon" onclick="openCart()">
      🛒
      <span class="nav-badge" id="cart-count">0</span>
    </div>
  </div>
</nav>

<div class="hero">
  <h1>Welcome to Valuren</h1>
  <p>Premium Fashion at Affordable Prices</p>
  <button class="hero-btn" onclick="document.getElementById('categories').scrollIntoView({behavior: 'smooth'})">Shop Now</button>
</div>

<div id="categories">
  <div class="section-title">Categories</div>
  <div class="cat-grid" id="cat-grid">
    <div class="loading">Loading categories...</div>
  </div>
</div>

<div id="featured">
  <div class="section-title">Featured Products</div>
  <div class="prod-grid" id="prod-grid">
    <div class="loading">Loading products...</div>
  </div>
</div>

<footer>
  <p>© 2026 Valuren. All Rights Reserved.</p>
  <p>📍 Dhaka, Bangladesh | 📞 01740-148347 | 💬 01749-148347</p>
</footer>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"
import { getFirestore, collection, onSnapshot, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

const firebaseConfig = {
  apiKey: "AIzaSyBz8JtI71CJju2mMJKI3fkCh7xZ3lZZ-0c",
  authDomain: "veluerstore0.firebaseapp.com",
  projectId: "veluerstore0",
  storageBucket: "veluerstore0.firebasestorage.app",
  messagingSenderId: "876027146820",
  appId: "1:876027146820:web:bd47e1e2bd3e9b615cc211"
}

const app = initializeApp(firebaseConfig)
const db = getFirestore(app)

let cart = JSON.parse(localStorage.getItem('cart') || '[]')
updateCartCount()

// Load categories
onSnapshot(query(collection(db, 'categories'), orderBy('createdAt', 'desc')), (snap) => {
  const html = snap.docs.length ? snap.docs.map(d => {
    const cat = d.data()
    return `<div class="cat-card">
      <div class="cat-img"><img src="${cat.image || 'https://via.placeholder.com/300x250'}" alt="${cat.name}" onerror="this.src='https://via.placeholder.com/300x250'"></div>
      <div class="cat-name">${cat.name}</div>
      <button class="cat-btn" onclick="goCategory('${cat.name}')">View Collection</button>
    </div>`
  }).join('') : '<div style="grid-column: 1/-1; text-align: center; padding: 2rem;">No categories yet</div>'
  
  document.getElementById('cat-grid').innerHTML = html
})

// Load products
onSnapshot(query(collection(db, 'products'), where('listed', '==', true), orderBy('createdAt', 'desc')), (snap) => {
  const html = snap.docs.length ? snap.docs.map(d => {
    const prod = d.data()
    return `<div class="prod-card">
      <div class="prod-img"><img src="${prod.image || 'https://via.placeholder.com/200x300'}" alt="${prod.name}" onerror="this.src='https://via.placeholder.com/200x300'"></div>
      <div class="prod-info">
        <div class="prod-name">${prod.namebn || prod.name}</div>
        <div class="prod-price">৳${Number(prod.price).toLocaleString()}</div>
        <button class="btn btn-black prod-btn" onclick="addToCart({id: '${d.id}', name: '${prod.name}', price: ${prod.price}, image: '${prod.image}'})">Add</button>
      </div>
    </div>`
  }).join('') : '<div style="grid-column: 1/-1; text-align: center; padding: 2rem;">No products found</div>'
  
  document.getElementById('prod-grid').innerHTML = html
})

window.goCategory = (cat) => {
  alert('Category: ' + cat + '\n\nFull category pages coming soon!')
}

window.addToCart = (prod) => {
  cart.push(prod)
  localStorage.setItem('cart', JSON.stringify(cart))
  updateCartCount()
  alert(`✅ "${prod.name}" added to cart!`)
}

window.openCart = () => {
  alert(`🛒 Cart Items: ${cart.length}\n\nCart feature coming soon!\n\nTotal: ৳${cart.reduce((s, p) => s + p.price, 0).toLocaleString()}`)
}

function updateCartCount() {
  document.getElementById('cart-count').textContent = cart.length
}
</script>

</body>
</html>
